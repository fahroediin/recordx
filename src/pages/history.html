<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RecordX - History</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="history.css">
</head>
<body>
  <div class="page">
    <!-- Header -->
    <header class="page-header">
      <div class="page-header__left">
        <div class="page-header__logo">
          <svg width="28" height="28" viewBox="0 0 64 64" fill="none">
            <defs>
              <linearGradient id="hLogoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" style="stop-color:#ffffff"/>
                <stop offset="100%" style="stop-color:#7a7a7a"/>
              </linearGradient>
            </defs>
            <circle cx="32" cy="32" r="12" fill="url(#hLogoGrad)"/>
            <polygon points="28,24 28,40 42,32" fill="white"/>
          </svg>
        </div>
        <h1 class="page-header__title">Recording History</h1>
      </div>
      <div class="page-header__right">
        <div class="search-box">
          <svg class="search-box__icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/>
            <line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <input id="search-input" type="text" class="search-box__input" placeholder="Search recordings..." />
        </div>
      </div>
    </header>

    <!-- Content -->
    <main class="page-content">
      <!-- Loading State -->
      <div id="loading-state" class="state-container">
        <div class="spinner"></div>
        <p>Loading recordings...</p>
      </div>

      <!-- Empty State -->
      <div id="empty-state" class="state-container hidden">
        <div class="empty-icon">📹</div>
        <h2 class="empty-title">No recordings yet</h2>
        <p class="empty-desc">Start your first recording from the RecordX extension popup</p>
      </div>

      <!-- Recordings Grid -->
      <div id="recordings-grid" class="recordings-grid hidden"></div>

      <!-- Load More -->
      <div id="load-more-container" class="load-more-container hidden">
        <button id="btn-load-more" class="btn btn--secondary" type="button">Load More</button>
      </div>
    </main>

    <!-- Video Player Modal -->
    <div id="player-modal" class="modal hidden">
      <div class="modal__backdrop" id="modal-backdrop"></div>
      <div class="modal__content">
        <div class="modal__header">
          <h3 id="player-title" class="modal__title">Recording</h3>
          <button id="btn-close-modal" class="modal__close" type="button">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="18" y1="6" x2="6" y2="18"/>
              <line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
          </button>
        </div>
        <div class="modal__body">
          <video id="video-player" class="video-player" controls></video>
        </div>
        <div class="modal__footer">
          <button id="btn-download" class="btn btn--secondary" type="button">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
              <polyline points="7 10 12 15 17 10"/>
              <line x1="12" y1="15" x2="12" y2="3"/>
            </svg>
            Download
          </button>
          <button id="btn-transcript" class="btn btn--secondary" type="button">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
              <polyline points="14 2 14 8 20 8"/>
              <line x1="16" y1="13" x2="8" y2="13"/>
              <line x1="16" y1="17" x2="8" y2="17"/>
            </svg>
            Transcript
          </button>
          <button id="btn-mom" class="btn btn--primary" type="button">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/>
              <path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/>
            </svg>
            Generate MoM
          </button>
        </div>
      </div>
    </div>

    <!-- Transcript Modal -->
    <div id="transcript-modal" class="modal hidden">
      <div class="modal__backdrop" id="transcript-backdrop"></div>
      <div class="modal__content modal__content--narrow">
        <div class="modal__header">
          <h3 class="modal__title">Transcript</h3>
          <button id="btn-close-transcript" class="modal__close" type="button">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="18" y1="6" x2="6" y2="18"/>
              <line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
          </button>
        </div>
        <div class="modal__body">
          <div id="transcript-content" class="transcript-full"></div>
        </div>
        <div class="modal__footer">
          <button id="btn-copy-transcript" class="btn btn--secondary" type="button">Copy to Clipboard</button>
        </div>
      </div>
    </div>

  </div>

  <script type="module" src="history.js"></script>
</body>
</html>

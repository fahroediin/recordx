<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=400, initial-scale=1.0">
  <title>RecordX</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div id="app" class="app">

    <!-- ═══ Auth Screen ═══ -->
    <div id="auth-screen" class="screen screen--auth">
      <div class="auth-container">
        <div class="logo-container">
          <div class="logo-glow"></div>
          <div class="logo-icon">
            <svg width="64" height="64" viewBox="0 0 64 64" fill="none">
              <defs>
                <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                  <stop offset="0%" style="stop-color:#FF6B6B"/>
                  <stop offset="50%" style="stop-color:#EE5A24"/>
                  <stop offset="100%" style="stop-color:#F0932B"/>
                </linearGradient>
              </defs>
              <circle cx="32" cy="32" r="28" fill="url(#logoGrad)" opacity="0.15"/>
              <circle cx="32" cy="32" r="20" fill="url(#logoGrad)" opacity="0.3"/>
              <circle cx="32" cy="32" r="12" fill="url(#logoGrad)"/>
              <polygon points="28,24 28,40 42,32" fill="white"/>
            </svg>
          </div>
        </div>
        <h1 class="auth-title">RecordX</h1>
        <p class="auth-subtitle">Screen recorder with transcription &amp; meeting notes</p>

        <button id="btn-google-login" class="btn btn--google" type="button">
          <svg class="btn__icon" width="20" height="20" viewBox="0 0 24 24">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
          <span>Sign in with Google</span>
        </button>

        <p class="auth-footer">Your recordings are saved securely in the cloud</p>
      </div>
    </div>

    <!-- ═══ Main Screen ═══ -->
    <div id="main-screen" class="screen screen--main hidden">
      
      <!-- Header -->
      <header class="header">
        <div class="header__brand">
          <div class="header__logo">
            <svg width="24" height="24" viewBox="0 0 64 64" fill="none">
              <defs>
                <linearGradient id="logoSmGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                  <stop offset="0%" style="stop-color:#FF6B6B"/>
                  <stop offset="100%" style="stop-color:#F0932B"/>
                </linearGradient>
              </defs>
              <circle cx="32" cy="32" r="12" fill="url(#logoSmGrad)"/>
              <polygon points="28,24 28,40 42,32" fill="white"/>
            </svg>
          </div>
          <span class="header__title">RecordX</span>
        </div>
        <div class="header__actions">
          <button id="btn-history" class="icon-btn" title="History" type="button">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10"/>
              <polyline points="12 6 12 12 16 14"/>
            </svg>
          </button>
          <div id="user-menu" class="user-menu">
            <button id="btn-user" class="avatar-btn" title="Account" type="button">
              <img id="user-avatar" class="avatar" src="" alt="User" />
              <span id="user-initials" class="avatar-initials"></span>
            </button>
            <div id="user-dropdown" class="dropdown hidden">
              <div class="dropdown__header">
                <span id="dropdown-name" class="dropdown__name"></span>
                <span id="dropdown-email" class="dropdown__email"></span>
              </div>
              <div class="dropdown__divider"></div>
              <button id="btn-logout" class="dropdown__item dropdown__item--danger" type="button">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/>
                  <polyline points="16 17 21 12 16 7"/>
                  <line x1="21" y1="12" x2="9" y2="12"/>
                </svg>
                Sign Out
              </button>
            </div>
          </div>
        </div>
      </header>

      <!-- Recording Mode Selector -->
      <section id="mode-section" class="section section--modes">
        <h2 class="section__title">Recording Mode</h2>
        <div class="mode-grid">
          <button class="mode-card mode-card--active" data-mode="screen_only" type="button">
            <div class="mode-card__icon">🖥️</div>
            <div class="mode-card__label">Screen</div>
            <div class="mode-card__desc">Video only</div>
          </button>
          <button class="mode-card" data-mode="screen_mic" type="button">
            <div class="mode-card__icon">🎙️</div>
            <div class="mode-card__label">+ Mic</div>
            <div class="mode-card__desc">With microphone</div>
          </button>
          <button class="mode-card" data-mode="screen_mic_system" type="button">
            <div class="mode-card__icon">🎛️</div>
            <div class="mode-card__label">Mic + System</div>
            <div class="mode-card__desc">All audio sources</div>
          </button>
          <button class="mode-card" data-mode="screen_system" type="button">
            <div class="mode-card__icon">🔊</div>
            <div class="mode-card__label">System</div>
            <div class="mode-card__desc">System audio only</div>
          </button>
        </div>
      </section>

      <!-- Language Selector -->
      <section id="lang-section" class="section section--lang">
        <label class="lang-label" for="lang-select">Transcription Language</label>
        <select id="lang-select" class="lang-select">
          <option value="id-ID">🇮🇩 Bahasa Indonesia</option>
          <option value="en-US">🇺🇸 English (US)</option>
          <option value="en-GB">🇬🇧 English (UK)</option>
        </select>
      </section>

      <!-- Record Button -->
      <section class="section section--record">
        <button id="btn-record" class="record-btn" type="button">
          <div class="record-btn__pulse"></div>
          <div class="record-btn__inner">
            <svg id="icon-record" width="32" height="32" viewBox="0 0 24 24" fill="currentColor">
              <circle cx="12" cy="12" r="8"/>
            </svg>
          </div>
        </button>
        <p id="record-label" class="record-label">Start Recording</p>
      </section>

      <!-- Recording Controls (shown during recording) -->
      <section id="recording-section" class="section section--recording hidden">
        <div class="recording-header">
          <div class="recording-indicator">
            <span class="recording-dot"></span>
            <span id="recording-status-text" class="recording-status-text">Recording</span>
          </div>
          <div id="recording-timer" class="recording-timer">00:00</div>
        </div>

        <!-- Audio Visualizer -->
        <div class="visualizer-container">
          <canvas id="visualizer" class="visualizer" width="360" height="60"></canvas>
        </div>

        <!-- Live Transcript -->
        <div id="transcript-container" class="transcript-container">
          <div class="transcript-header">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"/>
              <path d="M19 10v2a7 7 0 01-14 0v-2"/>
              <line x1="12" y1="19" x2="12" y2="23"/>
              <line x1="8" y1="23" x2="16" y2="23"/>
            </svg>
            <span>Live Transcript</span>
          </div>
          <div id="transcript-text" class="transcript-text">
            <span class="transcript-placeholder">Waiting for speech...</span>
          </div>
        </div>

        <!-- Recording Actions -->
        <div class="recording-actions">
          <button id="btn-pause" class="action-btn action-btn--pause" title="Pause" type="button">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
              <rect x="6" y="4" width="4" height="16"/>
              <rect x="14" y="4" width="4" height="16"/>
            </svg>
          </button>
          <button id="btn-stop" class="action-btn action-btn--stop" title="Stop" type="button">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
              <rect x="6" y="6" width="12" height="12" rx="2"/>
            </svg>
          </button>
          <button id="btn-resume" class="action-btn action-btn--resume hidden" title="Resume" type="button">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
              <polygon points="5,3 19,12 5,21"/>
            </svg>
          </button>
        </div>
      </section>

      <!-- Processing/Uploading State -->
      <section id="processing-section" class="section section--processing hidden">
        <div class="processing-content">
          <div class="spinner"></div>
          <p id="processing-text" class="processing-text">Processing recording...</p>
          <div id="progress-bar-container" class="progress-bar-container hidden">
            <div id="progress-bar" class="progress-bar"></div>
          </div>
        </div>
      </section>

      <!-- Done State -->
      <section id="done-section" class="section section--done hidden">
        <div class="done-content">
          <div class="done-icon">✅</div>
          <p class="done-text">Recording saved!</p>
          <div class="done-meta">
            <span id="done-duration"></span>
            <span id="done-size"></span>
          </div>
          <div class="done-actions">
            <button id="btn-view-history" class="btn btn--secondary" type="button">View History</button>
            <button id="btn-new-recording" class="btn btn--primary" type="button">New Recording</button>
          </div>
        </div>
      </section>

      <!-- Error State -->
      <section id="error-section" class="section section--error hidden">
        <div class="error-content">
          <div class="error-icon">⚠️</div>
          <p id="error-text" class="error-text">An error occurred</p>
          <button id="btn-dismiss-error" class="btn btn--secondary" type="button">Dismiss</button>
        </div>
      </section>

    </div>
  </div>

  <script type="module" src="popup.js"></script>
</body>
</html>
